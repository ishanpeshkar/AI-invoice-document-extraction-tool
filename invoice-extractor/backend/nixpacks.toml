# easyocr (and its torch dependency) are intentionally excluded from
# requirements.txt to keep the Docker image under Railway's 4 GB limit.
# The default "ai" extraction mode (Groq LLM) works without them.
# OCR mode requires a manual: pip install easyocr

[phases.build]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"